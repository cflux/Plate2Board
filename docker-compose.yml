services:
  backend:
    container_name: keeb-layout-bot-backend
    build: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    environment:
      FREEROUTING_URL: http://freerouting:37864
    depends_on:
      - freerouting

  frontend:
    container_name: keeb-layout-bot-frontend
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8011}:80"
    depends_on:
      - backend

  freerouting:
    container_name: keeb-freerouting
    image: ghcr.io/freerouting/freerouting:2.2.4
    restart: unless-stopped
    # Internal-only: the backend reaches it on the compose network as
    # http://freerouting:37864. No host port is published.
    # Auth defaults to ENABLED (the server requires a Bearer key) and the
    # API binds to 127.0.0.1 only. For an internal-only sidecar both need
    # explicit overrides: disable auth + bind to all interfaces so the
    # backend container can reach it on the compose network.
    command:
      - java
      - -jar
      - /app/freerouting-executable.jar
      - --gui.enabled=false
      - --api_server.enabled=true
      - --api_server.authentication.enabled=false
      - --api_server.endpoints=http://0.0.0.0:37864
